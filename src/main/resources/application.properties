spring.application.name=order-service-sample
server.port=8080

# AWS
aws.region=us-east-2

# DynamoDB tables. The orders table is deliberately under-provisioned so the hot
# write path throttles under load (ProvisionedThroughputExceededException) — the
# production signal that a Dynatrace-informed v1->v2 migration reacts to.
orders.table=order-service-orders
orders.table.read-capacity=1
orders.table.write-capacity=1
inventory.table=order-service-inventory

# S3 bucket for nightly report exports (cold path).
reports.bucket=order-service-reports
